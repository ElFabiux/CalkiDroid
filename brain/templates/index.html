<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Plotclock</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --pla-gray:       #a8a4a0;
            --pla-dark:       #7e7b78;
            --pla-darker:     #636160;
            --pla-light:      #c4c0bc;
            --pla-lighter:    #d8d5d0;
            --servo-blue:     #3560a8;
            --servo-blue-hi:  #4a78c8;
            --servo-blue-lo:  #1e3e78;
            --wire-brown:     #7a3e20;
            --wire-red:       #c82018;
            --wire-orange:    #e07010;
            --tape:           rgba(234, 215, 148, 0.72);
            --tape-edge:      rgba(200, 178, 100, 0.50);
            --text-dark:      #1e1c18;
            --text-mid:       #4a4640;
            --text-light:     #ece8e2;
            --text-dim:       rgba(236, 232, 226, 0.55);
        }

        body {
            min-height: 100vh;
            background: var(--pla-gray);
            color: var(--text-dark);
            font-family: 'Courier New', 'Lucida Console', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0 14px 48px;
        }

        /* ══ WIRE HEADER STRIPE ══════════════════════════════════════
           Simula la vista transversal del cable de 3 pines del servo  */
        .wire-header {
            width: 100%;
            max-width: 668px;
            display: flex;
            height: 6px;
            gap: 2px;
            margin-bottom: 18px;
        }
        .wire-header div { flex: 1; }
        .wh-brown { background: var(--wire-brown); }
        .wh-red   { background: var(--wire-red); }
        .wh-orange{ background: var(--wire-orange); }

        /* ══ HEADER ══════════════════════════════════════════════════ */
        .header {
            width: 100%;
            max-width: 668px;
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            margin-bottom: 14px;
            gap: 12px;
        }

        /* Etiqueta estilo cinta de carrocero con título */
        .title-tape {
            background: var(--tape);
            border: 1px solid var(--tape-edge);
            padding: 6px 14px 6px 12px;
            position: relative;
            transform: rotate(-0.8deg);
            flex-shrink: 0;
        }
        /* Pedacito de cinta de agarre arriba */
        .title-tape::before {
            content: '';
            position: absolute;
            top: -6px; left: 14px;
            width: 36px; height: 8px;
            background: rgba(234, 215, 148, 0.55);
            border: 1px solid var(--tape-edge);
            transform: rotate(0.6deg);
        }

        .title-main {
            font-family: 'Arial Black', 'Impact', 'Arial', sans-serif;
            font-size: 19px;
            font-weight: 900;
            color: var(--text-dark);
            letter-spacing: 0.06em;
            text-transform: uppercase;
            line-height: 1;
        }
        .title-sub {
            font-size: 9px;
            color: var(--text-mid);
            letter-spacing: 0.14em;
            text-transform: uppercase;
            margin-top: 3px;
        }

        .header-meta {
            font-size: 9px;
            color: var(--text-mid);
            text-align: right;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            line-height: 1.7;
            padding-top: 2px;
        }

        /* ══ SWITCH DE MODO ══════════════════════════════════════════ */
        .mode-switch {
            width: 100%;
            max-width: 668px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-bottom: 10px;
        }
        .btn-mode {
            background: var(--pla-light);
            border-top:    2px solid var(--pla-lighter);
            border-left:   2px solid var(--pla-lighter);
            border-right:  2px solid var(--pla-darker);
            border-bottom: 2px solid var(--pla-darker);
            color: var(--text-dark);
            padding: 10px 8px;
            font-family: 'Arial Black', 'Impact', sans-serif;
            font-size: 11px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            cursor: pointer;
        }
        .btn-mode.active {
            background: var(--servo-blue);
            border-top-color: var(--servo-blue-hi);
            border-left-color: var(--servo-blue-hi);
            border-right-color: var(--servo-blue-lo);
            border-bottom-color: var(--servo-blue-lo);
            color: #fff;
        }

        /* ══ PANEL (MARCO DEL CANVAS) ════════════════════════════════
           Simula un panel de plástico gris, con relieve y tornillos   */
        .panel {
            width: 100%;
            max-width: 668px;
            background: var(--pla-dark);
            padding: 14px;
            border-top:    3px solid var(--pla-light);
            border-left:   3px solid var(--pla-light);
            border-right:  3px solid var(--pla-darker);
            border-bottom: 3px solid var(--pla-darker);
            position: relative;
        }

        /* Tornillos en esquinas */
        .screw {
            position: absolute;
            width: 11px; height: 11px;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 35%, #c8c4be, #7a7672);
            border: 1px solid #585450;
            z-index: 3;
        }
        .screw::after {
            content: '';
            position: absolute;
            top: 4px; left: 1px; right: 1px;
            height: 1.5px;
            background: rgba(60, 55, 50, 0.7);
            transform: rotate(40deg);
            transform-origin: center;
        }
        .screw.tl { top: 4px;  left: 4px;  }
        .screw.tr { top: 4px;  right: 4px; }
        .screw.bl { bottom: 4px; left: 4px;  }
        .screw.br { bottom: 4px; right: 4px; }

        /* Tiras de cinta sobre las esquinas del lienzo */
        .tape-strip {
            position: absolute;
            background: var(--tape);
            border: 1px solid var(--tape-edge);
            pointer-events: none;
            z-index: 2;
        }
        .tape-tl { top: 22px;  left: 22px;  width: 52px; height: 13px; transform: rotate(-2.5deg); }
        .tape-tr { top: 24px;  right: 20px; width: 48px; height: 13px; transform: rotate(1.8deg);  }
        .tape-br { bottom:22px; right: 22px; width: 44px; height: 13px; transform: rotate(-1deg);  }

        /* El canvas en sí */
        canvas {
            display: block;
            width: 100%;
            aspect-ratio: 64 / 50;
            background: #ffffff;
            border: 2px solid #444240;
            touch-action: none;
            cursor: crosshair;
            position: relative;
            z-index: 1;
        }
        canvas.drawing { border-color: var(--servo-blue-hi); }

        /* Panel alternativo para calculadora, conservando el estilo viejo */
        .calculator-card {
            display: none;
            width: 100%;
            aspect-ratio: 64 / 50;
            background: #ffffff;
            border: 2px solid #444240;
            position: relative;
            z-index: 1;
            padding: 24px 18px 18px;
            flex-direction: column;
            justify-content: center;
            gap: 12px;
        }
        body.calc-mode canvas { display: none; }
        body.calc-mode .calculator-card { display: flex; }

        .calc-label {
            font-family: 'Arial Black', 'Impact', sans-serif;
            font-size: 13px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--text-dark);
        }
        .calc-display {
            border: 2px solid #444240;
            background: #e9e5de;
            padding: 10px;
            min-height: 74px;
            font-size: 12px;
            line-height: 1.55;
            color: var(--text-mid);
            overflow-wrap: anywhere;
        }
        .calc-display b { color: var(--text-dark); }
        .calc-hint {
            font-size: 10px;
            color: var(--text-mid);
            line-height: 1.5;
        }
        .manual-row {
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 8px;
        }
        .manual-row input {
            border: 2px solid #444240;
            background: #f5f2eb;
            padding: 9px 8px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: var(--text-dark);
            outline: none;
        }

        /* ══ BARRA DE INFO ═══════════════════════════════════════════ */
        .info-bar {
            width: 100%;
            max-width: 668px;
            background: var(--pla-darker);
            border-top: 1px solid #505050;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 5px 10px;
            gap: 8px;
        }
        .info-item {
            font-size: 9px;
            color: var(--text-dim);
            letter-spacing: 0.1em;
            text-transform: uppercase;
            white-space: nowrap;
        }
        .info-item b {
            color: var(--text-light);
            font-weight: bold;
        }

        /* ══ BOTONERA ════════════════════════════════════════════════ */
        .toolbar,
        .toolbar-section {
            width: 100%;
            max-width: 668px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-top: 10px;
        }
        .toolbar-section { display: none; }
        .toolbar-section.active { display: grid; }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 15px 12px;
            border: none;
            font-family: 'Arial Black', 'Impact', sans-serif;
            font-size: 13px;
            font-weight: 900;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            cursor: pointer;
            position: relative;
            outline: none;
            transition: filter 0.1s;
        }

        .btn:active { transform: translateY(2px); filter: brightness(0.88); }

        /* Botón Borrar: plástico gris desgastado */
        .btn-clear,
        .btn-small {
            background: var(--pla-light);
            border-top:    2px solid var(--pla-lighter);
            border-left:   2px solid var(--pla-lighter);
            border-right:  2px solid var(--pla-darker);
            border-bottom: 2px solid var(--pla-darker);
            color: var(--text-dark);
        }
        .btn-small { padding: 9px 10px; font-size: 10px; }
        .btn-clear:hover,
        .btn-small:hover { background: #cecac4; }

        /* Botón Imprimir: azul del servo */
        .btn-print,
        .btn-record {
            background: var(--servo-blue);
            border-top:    2px solid var(--servo-blue-hi);
            border-left:   2px solid var(--servo-blue-hi);
            border-right:  2px solid var(--servo-blue-lo);
            border-bottom: 2px solid var(--servo-blue-lo);
            color: #ffffff;
            overflow: hidden;
        }
        .btn-record.recording {
            background: var(--wire-red);
            border-top-color: #e0524c;
            border-left-color: #e0524c;
            border-right-color: #8a1510;
            border-bottom-color: #8a1510;
        }
        .btn-print:hover:not(:disabled),
        .btn-record:hover:not(:disabled) { background: #3d6ab8; }

        /* Franja de cable en el botón imprimir (izquierda) */
        .btn-print::before,
        .btn-record::before {
            content: '';
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 6px;
            background: linear-gradient(
                to bottom,
                var(--wire-brown) 33.3%,
                var(--wire-red)   33.3% 66.6%,
                var(--wire-orange) 66.6%
            );
        }

        .btn-print:disabled,
        .btn-record:disabled {
            background: var(--pla-dark);
            border-top-color:   #666460;
            border-left-color:  #666460;
            border-right-color: #505050;
            border-bottom-color:#505050;
            color: var(--text-dim);
            cursor: not-allowed;
        }
        .btn-print:disabled::before,
        .btn-record:disabled::before { opacity: 0.3; }

        /* Texto del botón con margen por la franja */
        .btn-print .btn-inner,
        .btn-record .btn-inner { padding-left: 8px; }

        /* ══ TOAST ═══════════════════════════════════════════════════ */
        .toast {
            position: fixed;
            bottom: 18px;
            left: 50%;
            transform: translateX(-50%) translateY(56px);
            background: var(--pla-darker);
            border: 1px solid #555250;
            padding: 8px 16px;
            font-family: 'Courier New', monospace;
            font-size: 11px;
            letter-spacing: 0.06em;
            color: var(--text-light);
            text-transform: uppercase;
            opacity: 0;
            transition: transform 0.22s ease, opacity 0.22s ease;
            z-index: 99;
            white-space: nowrap;
        }
        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
        .toast.ok  { border-color: #5a9a50; color: #88dd78; }
        .toast.err { border-color: var(--wire-red); color: #f08080; }
    </style>
</head>
<body>

    <!-- Cable del servo: franja decorativa de 3 colores -->
    <div class="wire-header">
        <div class="wh-brown"></div>
        <div class="wh-red"></div>
        <div class="wh-orange"></div>
    </div>

    <header class="header">
        <div class="title-tape">
            <div class="title-main">CalkiDroid</div>
            <div class="title-sub">Drawing / Maths Robot &middot; ESP32</div>
        </div>
        <div class="header-meta">
            Área útil<br>
            64 &times; 50 mm<br>
            Res &ge; 1 mm
        </div>
    </header>

    <div class="mode-switch">
        <button class="btn-mode active" id="btnModeDraw" onclick="cambiarModo('draw')">Modo Dibujo</button>
        <button class="btn-mode" id="btnModeCalc" onclick="cambiarModo('calc')">Modo Calculador</button>
    </div>

    <!-- Marco tipo panel de plástico con tornillos y cinta -->
    <div class="panel">
        <div class="screw tl"></div>
        <div class="screw tr"></div>
        <div class="screw bl"></div>
        <div class="screw br"></div>
        <div class="tape-strip tape-tl"></div>
        <div class="tape-strip tape-tr"></div>
        <div class="tape-strip tape-br"></div>

        <canvas id="pizarra" width="640" height="500"></canvas>

        <div class="calculator-card" id="calculatorCard">
            <div class="calc-label">Entrada por voz</div>
            <div class="calc-display" id="calcDisplay">
                <b>Operación:</b> —<br>
                <b>Resultado:</b> —<br>
                <b>Robot:</b> —
            </div>
            <div class="calc-hint">
                Ejemplo: “dos más seis dividido entre tres”. Si el sistema no entiende la voz, no enviará nada al robot.
            </div>
            <div class="manual-row">
                <input id="manualText" type="text" placeholder="Prueba: dos mas seis dividido entre tres">
                <button class="btn btn-small" onclick="procesarTextoManual()">Probar</button>
            </div>
        </div>
    </div>

    <!-- Info strip debajo del panel -->
    <div class="info-bar">
        <div class="info-item" id="infoLeft">TRAZOS: <b id="conteo">0</b></div>
        <div class="info-item" id="coords">X: &mdash; &nbsp; Y: &mdash;</div>
        <div class="info-item" id="infoRight">LISTO</div>
    </div>

    <div class="toolbar-section active" id="toolbarDraw">
        <button class="btn btn-clear" onclick="limpiarPantalla()">&#x2715; Borrar</button>
        <button class="btn btn-print" id="btnPrint" onclick="imprimirRobot()" disabled>
            <span class="btn-inner">&#9113; Imprimir</span>
        </button>
    </div>

    <div class="toolbar-section" id="toolbarCalc">
        <button class="btn btn-record" id="btnRecord" onclick="toggleGrabacion()">
            <span class="btn-inner">&#9679; Grabar voz</span>
        </button>
        <button class="btn btn-print" id="btnPrintCalc" onclick="imprimirCalculo()" disabled>
            <span class="btn-inner">&#9113; Imprimir resultado</span>
        </button>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const canvas   = document.getElementById('pizarra');
        const ctx      = canvas.getContext('2d');
        const elConteo = document.getElementById('conteo');
        const elCoords = document.getElementById('coords');
        const btnPrint = document.getElementById('btnPrint');
        const toast    = document.getElementById('toast');

        const btnModeDraw = document.getElementById('btnModeDraw');
        const btnModeCalc = document.getElementById('btnModeCalc');
        const toolbarDraw = document.getElementById('toolbarDraw');
        const toolbarCalc = document.getElementById('toolbarCalc');
        const infoLeft    = document.getElementById('infoLeft');
        const infoRight   = document.getElementById('infoRight');
        const calcDisplay = document.getElementById('calcDisplay');
        const btnRecord   = document.getElementById('btnRecord');
        const btnPrintCalc = document.getElementById('btnPrintCalc');
        const manualText  = document.getElementById('manualText');

        ctx.lineWidth   = 4;
        ctx.lineCap     = 'round';
        ctx.lineJoin    = 'round';
        ctx.strokeStyle = '#1a1a1a';

        let modoActual       = 'draw';
        let dibujando        = false;
        let trazosGuardados  = [];
        let trazoActual      = [];
        let ultimoCalculo    = null;
        let mediaRecorder    = null;
        let audioChunks      = [];
        let streamActual     = null;
        let autoStopTimer    = null;

        // Tiempo máximo de grabación en milisegundos.
        // 7000 = 7 segundos, 10000 = 10 segundos, 15000 = 15 segundos.
        const TIEMPO_MAX_GRABACION_MS = 10000;

        // ── Cambio de modo ───────────────────────────────────────────
        function cambiarModo(modo) {
            modoActual = modo;
            document.body.classList.toggle('calc-mode', modo === 'calc');
            btnModeDraw.classList.toggle('active', modo === 'draw');
            btnModeCalc.classList.toggle('active', modo === 'calc');
            toolbarDraw.classList.toggle('active', modo === 'draw');
            toolbarCalc.classList.toggle('active', modo === 'calc');

            if (modo === 'draw') {
                infoLeft.innerHTML = `TRAZOS: <b id="conteo">${trazosGuardados.length}</b>`;
                elCoords.textContent = 'X: \u2014 \u00a0 Y: \u2014';
                infoRight.textContent = 'LISTO';
            } else {
                infoLeft.innerHTML = 'MODO: <b>CALC</b>';
                elCoords.textContent = 'VOZ: INACTIVA';
                infoRight.textContent = 'LISTO';
            }
        }

        // ── Coordenadas ───────────────────────────────────────────────
        function obtenerPuntoCartesiano(e) {
            const rect    = canvas.getBoundingClientRect();
            const clienteX = e.touches ? e.touches[0].clientX : e.clientX;
            const clienteY = e.touches ? e.touches[0].clientY : e.clientY;

            const escalaX = canvas.width  / rect.width;
            const escalaY = canvas.height / rect.height;
            const canvasX = (clienteX - rect.left) * escalaX;
            const canvasY = (clienteY - rect.top)  * escalaY;

            const mmX = canvasX / 10.0;
            const mmY = 50.0 - (canvasY / 10.0);

            return { x: mmX, y: mmY, pX: canvasX, pY: canvasY };
        }

        // ── Dibujo ────────────────────────────────────────────────────
        function iniciarTrazo(e) {
            if (modoActual !== 'draw') return;
            e.preventDefault();
            dibujando = true;
            canvas.classList.add('drawing');
            const p = obtenerPuntoCartesiano(e);
            trazoActual = [p];
            ctx.beginPath();
            ctx.moveTo(p.pX, p.pY);
            mostrarCoords(p);
        }

        function continuarTrazo(e) {
            if (modoActual !== 'draw') return;
            e.preventDefault();
            if (!dibujando) return;
            const p    = obtenerPuntoCartesiano(e);
            const prev = trazoActual[trazoActual.length - 1];
            const dist = Math.hypot(p.x - prev.x, p.y - prev.y);
            mostrarCoords(p);
            if (dist >= 1.0) {
                trazoActual.push(p);
                ctx.lineTo(p.pX, p.pY);
                ctx.stroke();
            }
        }

        function terminarTrazo(e) {
            if (modoActual !== 'draw') return;
            e.preventDefault();
            if (!dibujando) return;
            dibujando = false;
            canvas.classList.remove('drawing');
            if (trazoActual.length > 1) {
                trazosGuardados.push(trazoActual);
                actualizarUI();
            }
        }

        canvas.addEventListener('mousedown',  iniciarTrazo);
        canvas.addEventListener('mousemove',  continuarTrazo);
        canvas.addEventListener('mouseup',    terminarTrazo);
        canvas.addEventListener('mouseleave', e => { if (dibujando) terminarTrazo(e); });
        canvas.addEventListener('touchstart', iniciarTrazo,   { passive: false });
        canvas.addEventListener('touchmove',  continuarTrazo, { passive: false });
        canvas.addEventListener('touchend',   terminarTrazo,  { passive: false });

        // ── Helpers de UI ─────────────────────────────────────────────
        function mostrarCoords(p) {
            elCoords.textContent = `X: ${p.x.toFixed(1)}  Y: ${p.y.toFixed(1)}`;
        }

        function actualizarUI() {
            const conteoActual = document.getElementById('conteo');
            if (conteoActual) conteoActual.textContent = trazosGuardados.length;
            btnPrint.disabled = trazosGuardados.length === 0;
        }

        function mostrarToast(msg, tipo) {
            toast.textContent = msg;
            toast.className   = `toast ${tipo} show`;
            clearTimeout(toast._tid);
            toast._tid = setTimeout(() => { toast.className = `toast ${tipo}`; }, 3000);
        }

        function actualizarPanelCalculo(data) {
            ultimoCalculo = data;
            btnPrintCalc.disabled = !data || !data.printable_text;
            calcDisplay.innerHTML = `
                <b>Voz:</b> ${data.spoken_text || '—'}<br>
                <b>Operación:</b> ${data.operation || '—'}<br>
                <b>Resultado:</b> ${data.result || '—'}<br>
                <b>Robot:</b> ${data.printable_text || '—'}
            `;
        }

        // ── Acciones: Modo Dibujo ────────────────────────────────────
        function limpiarPantalla() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            trazosGuardados = [];
            trazoActual     = [];
            elCoords.textContent = 'X: \u2014 \u00a0 Y: \u2014';
            actualizarUI();
        }

        function imprimirRobot() {
            if (trazosGuardados.length === 0) {
                mostrarToast('DIBUJA ALGO PRIMERO', 'err');
                return;
            }
            btnPrint.querySelector('.btn-inner').textContent = 'Enviando...';
            btnPrint.disabled = true;

            fetch('/print', {
                method:  'POST',
                headers: { 'Content-Type': 'application/json' },
                body:    JSON.stringify({ trazos: trazosGuardados })
            })
            .then(res => res.json())
            .then(data => {
                if (data.ok === false) throw new Error(data.status || 'ERROR');
                mostrarToast(data.status || 'ENVIADO OK', 'ok');
            })
            .catch(err => mostrarToast(err.message || 'ERROR DE CONEXION', 'err'))
            .finally(() => {
                btnPrint.querySelector('.btn-inner').textContent = '\u2339 Imprimir';
                btnPrint.disabled = trazosGuardados.length === 0;
            });
        }

        // ── Acciones: Modo Calculador ────────────────────────────────
        async function toggleGrabacion() {
            if (mediaRecorder && mediaRecorder.state === 'recording') {
                detenerGrabacion();
                return;
            }
            await iniciarGrabacion();
        }

        async function iniciarGrabacion() {
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia || !window.MediaRecorder) {
                mostrarToast('MICROFONO NO SOPORTADO', 'err');
                return;
            }

            try {
                ultimoCalculo = null;
                btnPrintCalc.disabled = true;
                calcDisplay.innerHTML = `
                    <b>Voz:</b> Grabando...<br>
                    <b>Operación:</b> —<br>
                    <b>Resultado:</b> —<br>
                    <b>Robot:</b> —
                `;
                audioChunks = [];
                streamActual = await navigator.mediaDevices.getUserMedia({ audio: true });
                const tipo = MediaRecorder.isTypeSupported('audio/webm;codecs=opus') ? 'audio/webm;codecs=opus' : '';
                mediaRecorder = tipo ? new MediaRecorder(streamActual, { mimeType: tipo }) : new MediaRecorder(streamActual);

                mediaRecorder.ondataavailable = e => {
                    if (e.data && e.data.size > 0) audioChunks.push(e.data);
                };
                mediaRecorder.onstop = enviarAudioCalculadora;

                mediaRecorder.start();
                btnRecord.classList.add('recording');
                btnRecord.querySelector('.btn-inner').textContent = '\u25a0 Detener';
                elCoords.textContent = 'VOZ: GRABANDO';
                infoRight.textContent = 'ESCUCHANDO';
                mostrarToast('DICTA LA OPERACION', 'ok');

                clearTimeout(autoStopTimer);
                autoStopTimer = setTimeout(() => {
                    if (mediaRecorder && mediaRecorder.state === 'recording') detenerGrabacion();
                }, TIEMPO_MAX_GRABACION_MS);
            } catch (err) {
                mostrarToast('NO SE PUDO ABRIR EL MICROFONO', 'err');
            }
        }

        function detenerGrabacion() {
            clearTimeout(autoStopTimer);
            if (mediaRecorder && mediaRecorder.state === 'recording') mediaRecorder.stop();
            if (streamActual) streamActual.getTracks().forEach(track => track.stop());
            btnRecord.classList.remove('recording');
            btnRecord.querySelector('.btn-inner').textContent = '\u25cf Grabar voz';
            elCoords.textContent = 'VOZ: PROCESANDO';
            infoRight.textContent = 'PROCESANDO';
        }

        async function enviarAudioCalculadora() {
            try {
                calcDisplay.innerHTML = `
                    <b>Voz:</b> Analizando grabación...<br>
                    <b>Operación:</b> —<br>
                    <b>Resultado:</b> —<br>
                    <b>Robot:</b> —
                `;
                const blob = new Blob(audioChunks, { type: 'audio/webm' });
                const formData = new FormData();
                formData.append('audio', blob, 'voz.webm');

                const res = await fetch('/calculate', { method: 'POST', body: formData });
                const data = await res.json();
                if (!res.ok || data.ok === false) throw new Error(data.status || 'NO SE ENTENDIO');

                actualizarPanelCalculo(data);
                elCoords.textContent = 'VOZ: OK';
                infoRight.textContent = 'LISTO';
                mostrarToast('RESULTADO LISTO', 'ok');
            } catch (err) {
                ultimoCalculo = null;
                btnPrintCalc.disabled = true;
                calcDisplay.innerHTML = `
                    <b>Voz:</b> No entendida<br>
                    <b>Operación:</b> —<br>
                    <b>Resultado:</b> —<br>
                    <b>Robot:</b> —
                `;
                elCoords.textContent = 'VOZ: ERROR';
                infoRight.textContent = 'REINTENTAR';
                mostrarToast(err.message || 'ERROR AL PROCESAR VOZ', 'err');
            }
        }

        async function procesarTextoManual() {
            const text = manualText.value.trim();
            if (!text) {
                mostrarToast('ESCRIBE UNA OPERACION', 'err');
                return;
            }
            try {
                const res = await fetch('/calculate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text })
                });
                const data = await res.json();
                if (!res.ok || data.ok === false) throw new Error(data.status || 'NO SE ENTENDIO');
                actualizarPanelCalculo(data);
                elCoords.textContent = 'TEXTO: OK';
                infoRight.textContent = 'LISTO';
                mostrarToast('RESULTADO LISTO', 'ok');
            } catch (err) {
                mostrarToast(err.message || 'ERROR', 'err');
            }
        }

        function imprimirCalculo() {
            if (!ultimoCalculo || !ultimoCalculo.printable_text) {
                mostrarToast('NO HAY RESULTADO', 'err');
                return;
            }
            btnPrintCalc.querySelector('.btn-inner').textContent = 'Enviando...';
            btnPrintCalc.disabled = true;

            fetch('/print-calculation', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ printable_text: ultimoCalculo.printable_text })
            })
            .then(res => res.json())
            .then(data => {
                if (data.ok === false) throw new Error(data.status || 'ERROR');
                mostrarToast(data.status || 'RESULTADO ENVIADO', 'ok');
                infoRight.textContent = 'LISTO';
            })
            .catch(err => mostrarToast(err.message || 'ERROR DE CONEXION', 'err'))
            .finally(() => {
                btnPrintCalc.querySelector('.btn-inner').textContent = '\u2339 Imprimir resultado';
                btnPrintCalc.disabled = false;
            });
        }
    </script>
</body>
</html>
